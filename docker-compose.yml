version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - .:/app                  # hot-reload in sviluppo
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - PORT=8000
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
